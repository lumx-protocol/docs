openapi: 3.0.3
info:
  version: 2.0.0
  title: Lumx Protocol
  description: Lumx Protocol API
servers:
  - url: https://protocol-staging.int.lumx.io/v2
paths:
  /projects/auth:
    post:
      summary: Create a project
      description: This endpoint creates a project and an API key.
      security: []
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ProjectRequest"
              required:
                - name
                - blockchainName
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
  /wallets:
    post:
      summary: Create a wallet
      description: This endpoint creates a wallet
      tags:
        - Wallets
      responses:
        "201":
          description: Successfully created the wallet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletResponse"
        "500":
          description: A Error ocurred trying to create wallet
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: A Error ocurred trying to create wallet
      security:
        - apiKey: []
    get:
      tags:
        - Wallets
      summary: Read all wallets
      description: >-
        This endpoint reads all wallets
      responses:
        "200":
          description: The list of wallets was retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WalletResponse"
      security:
        - apiKey: []
  "/wallets/{walletId}":
    get:
      tags:
        - Wallets
      summary: Read a wallet
      description: This endpoint reads a wallet and returns a list of all tokens contained within it
      parameters:
        - name: walletId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the wallet.
      responses:
        "200":
          description: >-
            The details of the wallet and the list of tokens it holds were
            retrieved successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WalletResponse"
                  - type: object
                    properties:
                      tokens:
                        description: The tokens owned by this wallet.
                        type: array
                        items:
                          $ref: "#/components/schemas/TokenResponse"
        "404":
          description: Wallet not found!
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Wallet not found!
      security:
        - apiKey: []
  /contracts:
    post:
      tags:
        - Contracts
      summary: Create a contract
      description: >-
        This endpoint creates a contract.
        Please, remember to deploy the contract before interacting with it.
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ContractRequest"
                - type: object
                  properties:
                    type:
                      type: string
                      enum:
                        - fungible
                        - non_fungible
                      description: >-
                        The type of the contract.
              required:
                - name
                - type
      responses:
        "201":
          description: Contract created successfully (but not deployed yet).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractResponse"
        "403":
          description: This contract does not belong to this project.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: This contract does not belong to this project
        "409":
          description: You can not update a deployed contract.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: You can not update a deployed contract
      security:
        - apiKey: []
    get:
      tags:
        - Contracts
      summary: Read all contracts
      description: This endpoint reads all your contracts
      responses:
        "200":
          description: The list of contracts was retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContractResponse"
      security:
        - apiKey: []
  "/contracts/{contractId}":
    get:
      tags:
        - Contracts
      summary: Read a contract
      description: This endpoint reads a contract
      parameters:
        - name: contractId
          in: path
          description: The ID of the contract.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The details of this contract were retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractResponse"
      security:
        - apiKey: []
    patch:
      tags:
        - Contracts
      summary: Update a contract
      description: >-
        This endpoint updates a contract.
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the contract.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractRequest"
      responses:
        "200":
          description: Contract updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractResponse"
      security:
        - apiKey: []
  "/contracts/{contractId}/deploy":
    post:
      tags:
        - Contracts
      summary: Deploy a contract
      description: >-
        This endpoint deploys a contract.
      parameters:
        - name: contractId
          in: path
          description: The ID of the contract to be deployed.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Contract deployed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractResponse"
        "403":
          description: This contract does not belong to this project.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: This contract does not belong to this project
        "409":
          description: This contract is already deployed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: This contract is already deployed

        "500":
          description: Error while trying to deploy contract.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Error while trying to deploy contract
      security:
        - apiKey: []
  "/contracts/{contractId}/token-types":
    post:
      tags:
        - Contracts
      summary: Create a token type
      description: >-
        This endpoint creates a token type for a contract.
      parameters:
        - name: contractId
          in: path
          description: The ID of the contract.
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenTypeRequest"
              required:
                - name
                - description
                - maxSupply
      responses:
        "201":
          description: Token type successfully created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenTypeResponse"
        "403":
          description: This contract does not belong to this project.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: This contract does not belong to this project
        "500":
          description: Failed while trying to export metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed while trying to export metadata.
      security:
        - apiKey: []
    get:
      tags:
        - Contracts
      summary: Read all token types
      description: This endpoint reads all token type from a contract.
      parameters:
        - name: contractId
          in: path
          description: The ID of the contract.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The list of token types for this contract was retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TokenTypeResponse"
      security:
        - apiKey: []
  "/contracts/{contractId}/token-types/{uriNumber}":
    get:
      tags:
        - Contracts
      summary: Read a token type
      description: This endpoint reads a token type from a contract.
      parameters:
        - name: contractId
          in: path
          description: The ID of the contract to which the token type belongs.
          required: true
          schema:
            type: string
            format: uuid
        - name: uriNumber
          in: path
          description: The sequential identifier of the token type within the contract.
          required: true
          schema:
            type: number
      responses:
        "200":
          description: The details of this token type were retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenTypeResponse"
        "403":
          description: This token type does not belong to this contract id.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: This token type does not belong to this contract id
      security:
        - apiKey: []
    patch:
      tags:
        - Contracts
      summary: Update a token type
      description: This endpoint update a token type of a contract.
      parameters:
        - name: contractId
          in: path
          description: The ID of the contract to which the token type belongs.
          required: true
          schema:
            type: string
            format: uuid
        - name: uriNumber
          in: path
          description: The sequential identifier of the token type within the contract.
          required: true
          schema:
            type: number
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenTypeUpdateRequest"
      responses:
        "200":
          description: The token type was updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenTypeResponse"
        "403":
          description: This contract does not belong to this project.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: This contract does not belong to this project
      security:
        - apiKey: []
  /transactions/mints:
    post:
      tags:
        - Transactions
      summary: Mint tokens
      description: >-
        Mint one or multiple tokens and send them to a wallet. Important: This
        is an ASYNC route! Use the read transaction route to check the mint's
        status.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - allOf:
                    - $ref: "#/components/schemas/TransactionMintRequest"
                      title: Non-fungible
                      required:
                        - contractId
                        - walletId
                    - type: object
                      properties:
                        uriNumber:
                          type: number
                          description: The sequential identifier of the token type within the contract.
                      required:
                        - uriNumber
                - allOf:
                    - $ref: "#/components/schemas/TransactionMintRequest"
                      title: Fungible
                      required:
                        - contractId
                        - walletId
                        - quantity
      responses:
        "202":
          description: >-
            The mint request was submitted to the blockchain. Important: This is
            an ASYNC route! Use the read transaction route to check the mint's
            status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TransactionResponse"
                  - $ref: "#/components/schemas/TransactionMintResponse"
                  - $ref: "#/components/schemas/TransactionTimeStamps"
        "409":
          description: Contract not deployed yet!.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: This contract does not belong to this project
        "403":
          description: Minting this amount will surpass the maximum tokens per address
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Minting this amount will surpass the maximum tokens per address
      security:
        - apiKey: []
  /transactions/transfers:
    post:
      tags:
        - Transactions
      summary: Transfer tokens
      description: >-
        Transfer tokens from a wallet. Important: This is an ASYNC route! Use
        the read transaction route to check the transfer's status.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - allOf:
                    - $ref: "#/components/schemas/TransactionTransferRequest"
                      title: Non-fungible token
                      required:
                        - contractId
                        - to
                        - from
                    - type: object
                      properties:
                        tokenId:
                          type: string
                          description: >-
                            The ID of the token that will be transferred. Not applicable for fungible tokens.
                      required:
                        - tokenId
                - allOf:
                    - $ref: "#/components/schemas/TransactionTransferRequest"
                      title: Fungible token
                      required:
                        - contractId
                        - to
                        - from
                    - type: object
                      properties:
                        quantity:
                          type: number
                          description: >-
                            The quantity of tokens to transfer. Not applicable for non-fungible
                            tokens.
                      required:
                        - quantity
      responses:
        "202":
          description: >-
            The transfer operation was submitted to the blockchain. Important:
            This is an ASYNC route! Use the read transaction route to check the
            transfer's status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TransactionResponse"
                  - $ref: "#/components/schemas/TransactionTransferResponse"
                  - $ref: "#/components/schemas/TransactionTimeStamps"
      security:
        - apiKey: []
  /transactions/custom:
    post:
      tags:
        - Transactions
      summary: Invoke a custom transaction
      description: Invoke any function of a smart contract
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionCustomRequest"
              required:
                - walletId
                - contractAddress
                - functionSignature
                - operations
      responses:
        "202":
          description: >-
            The transaction was submitted to the blockchain. Important: This is
            an ASYNC route! Use the read transaction route to check its status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TransactionResponse"
                  - $ref: "#/components/schemas/TransactionCustomResponse"
                  - $ref: "#/components/schemas/TransactionTimeStamps"
      security:
        - apiKey: []
  /transactions:
    get:
      tags:
        - Transactions
      summary: Read all transactions
      description: This endpoint reads all transactions made with your API key.
      responses:
        "200":
          description: The list of transactions was retrieved successfully
          content:
            application/json:
              schema:
                description: An array containing all transactions made by wallets of this project.
                anyOf:
                  - type: array
                    title: Mints
                    items:
                      allOf:
                        - $ref: "#/components/schemas/TransactionResponse"
                        - $ref: "#/components/schemas/TransactionMintResponse"
                        - $ref: "#/components/schemas/TransactionTimeStamps"
                  - type: array
                    title: Transfers
                    items:
                      allOf:
                        - $ref: "#/components/schemas/TransactionResponse"
                        - $ref: "#/components/schemas/TransactionTransferResponse"
                        - $ref: "#/components/schemas/TransactionTimeStamps"
                  - type: array
                    title: Custom
                    items:
                      allOf:
                        - $ref: "#/components/schemas/TransactionResponse"
                        - $ref: "#/components/schemas/TransactionCustomResponse"
                        - $ref: "#/components/schemas/TransactionTimeStamps"
      security:
        - apiKey: []
  "/transactions/{transactionId}":
    get:
      tags:
        - Transactions
      summary: Read a transaction
      description: This endpoint reads a transaction made with your API key.
      parameters:
        - name: transactionId
          in: path
          description: The ID of the transaction.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The details of the transaction were retrieved successfully
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    title: Mint
                    allOf:
                      - $ref: "#/components/schemas/TransactionResponse"
                      - $ref: "#/components/schemas/TransactionMintResponse"
                      - $ref: "#/components/schemas/TransactionTimeStamps"
                  - type: object
                    title: Transfer
                    allOf:
                      - $ref: "#/components/schemas/TransactionResponse"
                      - $ref: "#/components/schemas/TransactionTransferResponse"
                      - $ref: "#/components/schemas/TransactionTimeStamps"
                  - type: object
                    title: Custom
                    allOf:
                      - $ref: "#/components/schemas/TransactionResponse"
                      - $ref: "#/components/schemas/TransactionCustomResponse"
                      - $ref: "#/components/schemas/TransactionTimeStamps"
        "404":
          description: Transaction not found!
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Transaction not found!
      security:
        - apiKey: []
components:
  schemas:
    Blockchains:
      type: string
      enum:
        - Ethereum
        - Polygon
        - Chiliz
      description: The name of the blockchain.
    ProjectRequest:
      type: object
      properties:
        name:
          description: The name of the project.
          type: string
        blockchainName:
          description: The blockchain used by the project.
          $ref: "#/components/schemas/Blockchains"
    ProjectResponse:
      type: object
      properties:
        id:
          description: The unique identifier of the project.
          type: string
          format: uuid
        name:
          description: The name of the project.
          type: string
        blockchain:
          type: object
          description: Details of the blockchain used by the project.
          properties:
            name:
              $ref: "#/components/schemas/Blockchains"
              description: The name of the blockchain.
            decimalChainId:
              type: number
              description: The decimal chain ID of the blockchain.
        createdAt:
          type: string
          format: date-time
          description: The timestamp when the project was created.
        updatedAt:
          type: string
          format: date-time
          description: The timestamp when the project was last updated.
        apiKey:
          description: The API key associated with the project.
          type: string
    WalletResponse:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the wallet.
          format: uuid
        address:
          description: The blockchain address of the wallet.
          type: string
        projectId:
          description: The unique identifier of the project to which the wallet belongs.
          type: string
          format: uuid
        blockExplorerUrl:
          type: string
          nullable: true
          description: The URL of the block explorer for this wallet.
        createdAt:
          type: string
          format: date-time
          description: The timestamp when the wallet was created.
        updatedAt:
          type: string
          format: date-time
          description: The timestamp when the wallet was last updated.
    TokenResponse:
      type: object
      properties:
        contractId:
          type: string
          format: uuid
          nullable: true
          description: The unique identifier of the contract, if the token is part of a contract created through the Lumx Protocol.
        uriNumber:
          type: number
          nullable: true
          description: The URI number of the token type used for minting, if the token is part of a contract created through the Lumx Protocol.
        blockchainName:
          description: The name of the blockchain where this token is located.
          $ref: "#/components/schemas/Blockchains"
        contractAddress:
          type: string
          description: The blockchain address of the contract to which this token belongs.
        contractType:
          type: string
          enum:
            - fungible
            - non_fungible
          description: The type of contract ('fungible' or 'non_fungible').
        name:
          type: string
          description: The name of the token.
        tokenId:
          type: string
          nullable: true
          description: The on-chain identifier for this token, applicable only to non-fungible tokens.
        uri:
          type: string
          nullable: true
          description: The URI where the token's metadata is stored.
        metadata:
          type: object
          nullable: true
          description: Metadata associated with the token.
        symbol:
          type: string
          nullable: true
          description: The symbol representing the token.
        quantity:
          type: number
          description: The quantity of this token present in the wallet.
    ContractRequest:
      type: object
      properties:
        name:
          type: string
          description: The name of the contract.
        symbol:
          type: string
          description: The symbol of the contract, between 3 and 5 alphanumeric characters.
          default: contractName
        description:
          type: string
          description: A brief description of the contract.
    ContractResponse:
      type: object
      properties:
        id:
          format: uuid
          type: string
          description: The unique identifier of the contract.
        type:
          type: string
          description: The type of the contract.
        address:
          type: string
          nullable: true
          description: The blockchain address of the contract.
        name:
          type: string
          description: The name of the contract.
        symbol:
          type: string
          description: The symbol of the contract, between 3 and 5 alphanumeric characters.
          default: contractName
        description:
          type: string
          nullable: true
          description: A brief description of the contract.
        blockchainName:
          description: The name of the blockchain where the contract is deployed.
          $ref: "#/components/schemas/Blockchains"
        blockExplorerUrl:
          type: string
          nullable: true
          description: The URL of the block explorer for this contract.
        createdAt:
          type: string
          format: date-time
          description: The timestamp when the contract was created.
        updatedAt:
          type: string
          format: date-time
          description: The timestamp when the contract was last updated.
        deployedAt:
          type: string
          format: date-time
          nullable: true
          description: The timestamp when the contract was deployed to the blockchain.
    TokenTypeRequest:
      type: object
      properties:
        name:
          type: string
          description: The name of the token type. Each token type within a contract must have a unique name.
        description:
          type: string
          description: A brief description of the token type.
        maxSupply:
          type: number
          description: The maximum supply of the token type.
          maximum: 2000000000
        traits:
          type: object
          description: A dictionary of traits for the token type, where the key is the trait name and the value is the trait value.
        imageUrl:
          type: string
          description: The URL of the image representing the token type. Supported formats are PNG, JPEG, GIF, or MP4.
    TokenTypeResponse:
      type: object
      properties:
        id:
          format: uuid
          type: string
          description: The unique identifier of the token type.
        uriNumber:
          type: number
          description: The URI number associated with the token type.
        contractId:
          format: uuid
          type: string
          description: The unique identifier of the contract to which the token type belongs.
        name:
          type: string
          description: The name of the token type.
        description:
          type: string
          nullable: true
          description: A brief description of the token type.
        maxSupply:
          type: number
          description: The maximum supply of the token type.
          maximum: 2000000000
        currentSupply:
          type: number
          description: The current supply of the token type.
        traits:
          type: object
          description: A dictionary of traits for the token type, where the key is the trait name and the value is the trait value.
          properties:
            trait1_name:
              type: string
              default: trait1_value
            trait2_name:
              type: string
              default: trait2_value
            trait3_name:
              type: string
              default: trait3_value
        imageUrl:
          type: string
          nullable: true
          description: The URL of the image representing the token type. Supported formats are PNG, JPEG, GIF, or MP4.
        metadataUrl:
          type: string
          description: The URL where the metadata JSON of the token type is located.
        createdAt:
          type: string
          format: date-time
          description: The timestamp when the token type was created.
        updatedAt:
          type: string
          format: date-time
          description: The timestamp when the token type was last updated.
    TransactionMintRequest:
      properties:
        contractId:
          format: uuid
          type: string
          description: O identificador único do contrato de onde os tokens serão cunhados.
        walletId:
          type: string
          format: uuid
          description: O identificador único da carteira que receberá os tokens.
        quantity:
          type: number
          default: 1
          description: A quantidade de tokens a serem cunhados. Obrigatório se estiver cunhando tokens fungíveis.
    TransactionTransferRequest:
      type: object
      properties:
        contractId:
          type: string
          format: uuid
          description: O identificador único do contrato ao qual os tokens pertencem.
        from:
          type: string
          format: uuid
          description: O identificador único da carteira que está transferindo os tokens.
        to:
          type: string
          description: O endereço da carteira que receberá os tokens. Pode ser qualquer endereço, não limitado a carteiras criadas através da API.
          example: "0xa65aae78edef916d4102ba7b5672068c0d35fbff"
    TransactionCustomRequest:
      allOf:
        - type: object
          title: Custom
          properties:
            walletId:
              format: uuid
              type: string
              description: O identificador único da carteira que será usada para realizar a transação.
            contractAddress:
              type: string
              description: O endereço do contrato onde a transação ocorrerá. Pode ser qualquer contrato, desde que esteja implantado na mesma blockchain usada para o projeto atual.
              example: "0xa7Cb3EF2e19bCAA7C765370c39d7a06ea5595D08"
        - $ref: "#/components/schemas/TransactionCustomMetadata"
    TransactionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: O identificador único da transação.
        walletId:
          type: string
          format: uuid
          description: O identificador único da carteira que realizou a transação.
        status:
          type: string
          description: O status da transação na blockchain.
          enum:
            - pending
            - success
            - failed
        transactionHash:
          type: string
          description: O identificador desta transação na blockchain.
          nullable: true
        blockExplorerUrl:
          type: string
          nullable: true
          description: A URL do explorador de blocos onde os detalhes desta transação podem ser lidos.
        result:
          type: object
    TransactionTimeStamps:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
          description: A data/hora quando a transação foi submetida.
        updatedAt:
          type: string
          format: date-time
          description: A data/hora quando a transação foi atualizada pela última vez.
        completedAt:
          type: string
          format: date-time
          description: A data/hora quando a transação foi concluída.
          nullable: true
    TransactionMintResponse:
      type: object
      properties:
        request:
          description: Um objeto contendo os parâmetros usados para esta transação.
          oneOf:
            - $ref: "#/components/schemas/TransactionMintFungibleMetadata"
            - $ref: "#/components/schemas/TransactionMintNFTMetadata"
        type:
          type: string
          description: O tipo de transação.
          enum:
            - mint
    TransactionTransferResponse:
      type: object
      properties:
        request:
          description: Um objeto contendo os parâmetros usados para esta transação.
          oneOf:
            - $ref: "#/components/schemas/TransactionTransferFungibleMetadata"
            - $ref: "#/components/schemas/TransactionTransferNFTMetadata"
        type:
          type: string
          description: O tipo de transação.
          enum:
            - transfer
    TransactionCustomResponse:
      type: object
      properties:
        request:
          description: Um objeto contendo os parâmetros usados para esta transação.
          $ref: "#/components/schemas/TransactionCustomMetadata"
        type:
          type: string
          description: O tipo de transação.
          enum:
            - custom
    TransactionMintFungibleMetadata:
      type: object
      title: Mint - fungible
      description: Parâmetros para uma transação de cunhagem de tokens fungíveis.
      properties:
        contractId:
          type: string
          format: uuid
          description: O identificador único do contrato para esta cunhagem.
        quantity:
          type: number
          description: A quantidade de tokens para esta cunhagem.
    TransactionMintNFTMetadata:
      type: object
      title: Mint - non-fungible
      description: Parâmetros para uma transação de cunhagem de tokens não fungíveis.
      properties:
        contractId:
          type: string
          format: uuid
          description: O identificador único do contrato para esta cunhagem.
        uriNumber:
          type: string
          description: Indica qual dos tipos de token definidos pelo contrato é usado para esta cunhagem.
        quantity:
          type: number
          description: A quantidade de tokens para esta cunhagem.
    TransactionTransferFungibleMetadata:
      type: object
      title: Transfer - fungible
      description: Parâmetros para transferência de tokens fungíveis.
      properties:
        contractId:
          type: string
          format: uuid
          description: O identificador único do contrato do token fungível.
        quantity:
          type: number
          description: Quantidade de tokens transferidos.
          minimum: 1
        from:
          type: string
          format: uuid
          description: O identificador único da carteira que está transferindo os tokens.
        to:
          type: string
          description: O endereço da carteira que receberá os tokens. Pode ser qualquer endereço, não limitado a carteiras criadas através da API.
          example: "0xa65aae78edef916d4102ba7b5672068c0d35fbff"
    TransactionTransferNFTMetadata:
      type: object
      title: Transfer - non-fungible
      description: Parâmetros para transferência de tokens não fungíveis.
      properties:
        contractId:
          type: string
          format: uuid
          description: O identificador único do contrato do token não fungível.
        tokenId:
          type: string
          description: O identificador on-chain do token que você deseja transferir. Você pode encontrá-lo usando a rota de leitura da carteira.
          example: "0"
        from:
          type: string
          format: uuid
          description: O identificador único da carteira que está transferindo o token.
        to:
          type: string
          description: O endereço da carteira que receberá o token. Pode ser qualquer endereço, não limitado a carteiras criadas através da API.
          example: "0xa65aae78edef916d4102ba7b5672068c0d35fbff"
    TransactionCustomMetadata:
      type: object
      title: Custom
      description: Parâmetros para uma transação customizada.
      properties:
        operations:
          type: array
          description: Um array com objetos definindo as operações a serem executadas nesta transação.
          items:
            type: object
            properties:
              functionSignature:
                type: string
                description: A assinatura da função (nome e tipos de parâmetros).
              argumentsValues:
                type: array
                description: Um array contendo os valores a serem passados para a função, na ordem em que aparecem na assinatura da função.
                default: []
                items:
                  anyOf:
                    - type: string
                    - type: number
                    - type: boolean
                    - type: array
                      items:
                        anyOf:
                          - type: string
                          - type: number
                          - type: boolean
              messageValue:
                type: number
                description: Opcional. O valor de tokens nativos (ETH, MATIC, etc) a ser enviado junto com a operação.
                default: 0
            required:
              - functionSignature
  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      description: Bearer authentication header of the form `Bearer <API_KEY>`.
