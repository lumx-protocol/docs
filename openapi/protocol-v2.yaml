openapi: 3.0.3
info:
  version: 2.0.0
  title: Lumx Protocol
  description: Lumx Protocol API V2
servers:
  - url: "https://protocol-staging.int.lumx.io/v2"
paths:
  /projects/auth:
    post:
      summary: Create a project
      description: Use this route to create a project and an API key. In production environments, the API key must be requested through our support team.
      security: []
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CreateProjectResponse"
  /wallets:
    post:
      summary: Create a wallet
      description: Creates a wallet that has the same address in all our EVM supported chains.
      tags:
        - Wallets
      responses:
        "201":
          description: Successfully created the wallet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseWalletResponse"
        "500":
          description: A Error ocurred trying to create wallet
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: A Error ocurred trying to create wallet
      security:
        - apiKey: []
    get:
      tags:
        - Wallets
      summary: Read all wallets
      description: >-
        This endpoint reads the id and address of all wallets created through your
        API key.
      responses:
        "200":
          description: The list of wallets was retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BaseWalletResponse"
      security:
        - apiKey: []
  "/wallets/{walletId}":
    get:
      tags:
        - Wallets
      summary: Read a wallet
      description: This endpoint reads the tokens that belong to a wallet
      parameters:
        - name: walletId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the wallet.
      responses:
        "200":
          description: >-
            The details of the wallet and the list of tokens it holds were
            retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseWalletResponse"
                  - type: object
                    properties:
                      tokens:
                        description: Tokens that belong to this wallet.
                        type: array
                        items:
                          $ref: "#/components/schemas/TokenResponse"
        "404":
          description: Wallet not found!
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Wallet not found!
      security:
        - apiKey: []
  # '/wallets/{walletId}/sign':
  # post:
  #   tags:
  #     - Wallets
  #   summary: Sign a message
  #   description: Sign a message using the specified wallet.
  #   parameters:
  #     - name: walletId
  #       in: path
  #       required: true
  #       schema:
  #         type: string
  #         format: uuid
  #       description: The ID of the wallet that will be used to sign.
  #   requestBody:
  #     content:
  #       application/json:
  #         schema:
  #           type: object
  #           properties:
  #             message:
  #               type: string
  #           required:
  #             - message
  #   responses:
  #     '200':
  #       description: The message was signed succesfully.
  #       content:
  #         application/json:
  #           schema:
  #             type: object
  #             properties:
  #               message:
  #                 type: string
  #               signature:
  #                 type: string
  /contracts:
    post:
      tags:
        - Contracts
      summary: Create a contract
      description: >-
        This endpoint creates a contract, but doesn't deploy it. Use the "Deploy
        a contract" endpoint to deploy the contract to the blockchain.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractRequest"
              required:
                - name
                - type
                - description
                - blockchainName
      responses:
        "201":
          description: Contract created successfully (but not deployed yet).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractResponse"
        "403":
          description: This contract does not belong to this project.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: This contract does not belong to this project
        "409":
          description: You can not update a deployed contract.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: You can not update a deployed contract
      security:
        - apiKey: []
    get:
      tags:
        - Contracts
      summary: Read all contracts
      description: This endpoint reads all contracts
      responses:
        "200":
          description: The list of contracts was retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContractResponse"
      security:
        - apiKey: []
  "/contracts/{contractId}":
    get:
      tags:
        - Contracts
      summary: Read a contract
      description: This endpoint reads a contract
      parameters:
        - name: contractId
          in: path
          description: The ID of the contract.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The details of this contract were retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractResponse"
      security:
        - apiKey: []
    patch:
      tags:
        - Contracts
      summary: Update a contract
      description: >-
        This endpoint updates a contract. Only contracts that haven't been
        deployed yet can be updated.
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the contract.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractRequest"
      responses:
        "200":
          description: Contract updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractResponse"
      security:
        - apiKey: []
  "/contracts/{contractId}/deploy":
    post:
      tags:
        - Contracts
      summary: Deploy a contract
      description: >-
        This endpoint deploys a contract to the blockchain. Because this action
        creates a transaction on the blockchain, it might take some seconds to
        finish. We recommend using this route to deploy contracts beforehand, as
        opposed to calling it upon your end-user's interaction.
      parameters:
        - name: contractId
          in: path
          description: The ID of the contract to be deployed.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Contract deployed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractResponse"
        "403":
          description: This contract does not belong to this project.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: This contract does not belong to this project
        "409":
          description: This contract is already deployed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: This contract is already deployed

        "500":
          description: Error while trying to deploy contract.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Error while trying to deploy contract
      security:
        - apiKey: []
  "/contracts/{contractId}/token-types":
    post:
      tags:
        - Contracts
      summary: Create a token type
      description: >-
        Create a token type for a contract, enabling that contract to mint
        tokens that will have the characteristics defined here.
      parameters:
        - name: contractId
          in: path
          description: The ID of the contract to which the token type will be added.
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenTypeCreateRequest"
              required:
                - name
                - description
                - maxSupply
      responses:
        "201":
          description: Token type successfully created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenTypeResponse"
        "403":
          description: This contract does not belong to this project.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: This contract does not belong to this project
        "500":
          description: Failed while trying to export metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed while trying to export metadata.
      security:
        - apiKey: []
    get:
      tags:
        - Contracts
      summary: Read all token types
      description: Read all token types of a given contract
      parameters:
        - name: contractId
          in: path
          description: The ID of the contract.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The list of token types for this contract was retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TokenTypeResponse"
      security:
        - apiKey: []
  "/contracts/{contractId}/token-types/{uriNumber}":
    get:
      tags:
        - Contracts
      summary: Read a token type
      description: Read a token type from a contract
      parameters:
        - name: contractId
          in: path
          description: The ID of the contract to which the token type belongs.
          required: true
          schema:
            type: string
            format: uuid
        - name: uriNumber
          in: path
          description: The sequential identifier of the token type within the contract.
          required: true
          schema:
            type: number
      responses:
        "200":
          description: The details of this token type were retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenTypeResponse"
        "403":
          description: This token type does not belong to this contract id.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: This token type does not belong to this contract id
      security:
        - apiKey: []
    patch:
      tags:
        - Contracts
      summary: Update a token type
      description: Update a token type of a contract
      parameters:
        - name: contractId
          in: path
          description: The ID of the contract to which the token type belongs.
          required: true
          schema:
            type: string
            format: uuid
        - name: uriNumber
          in: path
          description: The sequential identifier of the token type within the contract.
          required: true
          schema:
            type: number
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenTypeUpdateRequest"
      responses:
        "200":
          description: The token type was updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenTypeResponse"
        "403":
          description: This contract does not belong to this project.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: This contract does not belong to this project
      security:
        - apiKey: []
  /transactions/mints:
    post:
      tags:
        - Transactions
      summary: Mint tokens
      description: >-
        Mint one or multiple tokens and send them to a wallet. Important: This
        is an ASYNC route! Use the read transaction route to check the mint's
        status.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - allOf:
                    - $ref: "#/components/schemas/MintRequest"
                      title: Non-fungible
                      required:
                        - contractId
                        - walletId
                    - type: object
                      properties:
                        uriNumber:
                          type: number
                          description: The sequential identifier of the token type within the contract.
                      required:
                        - uriNumber
                - allOf:
                    - $ref: "#/components/schemas/MintRequest"
                      title: Fungible
                      required:
                        - contractId
                        - walletId
                        - quantity
      responses:
        "202":
          description: >-
            The mint request was submitted to the blockchain. Important: This is
            an ASYNC route! Use the read transaction route to check the mint's
            status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BaseTransactionResponse"
                  - $ref: "#/components/schemas/MintTransactionResponse"
        "409":
          description: Contract not deployed yet!.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: This contract does not belong to this project
        "403":
          description: Minting this amount will surpass the maximum tokens per address
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Minting this amount will surpass the maximum tokens per address
      security:
        - apiKey: []
  /transactions/transfers:
    post:
      tags:
        - Transactions
      summary: Transfer tokens
      description: >-
        Transfer tokens from a wallet. Important: This is an ASYNC route! Use
        the read transaction route to check the transfer's status.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - allOf:
                    - $ref: "#/components/schemas/TransferRequest"
                      title: Non-fungible token
                      required:
                        - contractId
                        - to
                        - from
                    - type: object
                      properties:
                        tokenId:
                          type: string
                          description: >-
                            The ID of the token that will be transferred. Not applicable for fungible tokens.
                      required:
                        - tokenId
                - allOf:
                    - $ref: "#/components/schemas/TransferRequest"
                      title: Fungible token
                      required:
                        - contractId
                        - to
                        - from
                    - type: object
                      properties:
                        quantity:
                          type: number
                          description: >-
                            The quantity of tokens to transfer. Not applicable for non-fungible
                            tokens.
                      required:
                        - quantity
      responses:
        "202":
          description: >-
            The transfer operation was submitted to the blockchain. Important:
            This is an ASYNC route! Use the read transaction route to check the
            transfer's status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferTransactionResponse"
      security:
        - apiKey: []
  /transactions:
    # post:
    #   tags:
    #     - Transactions
    #   summary: Invoke a custom transaction
    #   description: Invoke any function of a smart contract
    #   requestBody:
    #     content:
    #       application/json:
    #         schema:
    #           $ref: "#/components/schemas/CustomTransactionRequest"
    #           required:
    #             - walletId
    #             - contractAddress
    #             - functionSignature
    #   responses:
    #     "202":
    #       description: >-
    #         The transaction was submitted to the blockchain. Important: This is
    #         an ASYNC route! Use the read transaction route to check its status.
    #       content:
    #         application/json:
    #           schema:
    #             $ref: "#/components/schemas/CustomTransactionResponse"
    get:
      tags:
        - Transactions
      summary: Read all transactions
      description: This endpoint reads all transactions made with your API key.
      responses:
        "200":
          description: The list of transactions was retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BaseTransactionResponse"
      security:
        - apiKey: []
  "/transactions/{transactionId}":
    get:
      tags:
        - Transactions
      summary: Read a transaction
      description: This endpoint reads a transaction made with your API key.
      parameters:
        - name: transactionId
          in: path
          description: The ID of the transaction.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The details of the transaction were retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseTransactionResponse"
        "404":
          description: Transaction not found!
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Transaction not found!
      security:
        - apiKey: []
components:
  schemas:
    CreateProjectRequest:
      type: object
      properties:
        name:
          description: The name of the project.
          type: string
    CreateProjectResponse:
      type: object
      properties:
        key:
          description: The API key of the project.
          type: string
        project:
          type: object
          properties:
            id:
              description: The id of the project.
              type: string
              format: uuid
            name:
              description: The name of the project.
              type: string
            createdAt:
              type: string
              format: date-time
              description: The timestamp from when the project was created.
            updatedAt:
              type: string
              format: date-time
              description: The timestamp from when the project was last updated.
    BaseWalletResponse:
      type: object
      properties:
        id:
          type: string
          description: The id for this wallet.
          format: uuid
        address:
          description: The blockchain address for this wallet.
          type: string
        projectId:
          description: The id of the project to which this wallet belongs.
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
          description: The timestamp from when the wallet was created.
        updatedAt:
          type: string
          format: date-time
          description: The timestamp from when the wallet was last updated.
    ContractRequest:
      type: object
      properties:
        type:
          type: string
          enum:
            - fungible
            - non_fungible
          description: >-
            The type of the contract. See <help page URL> to understand the
            differences between the contract types.
        name:
          type: string
          description: The name of the contract.
        description:
          type: string
          description: The description of the contract.
        blockchainName:
          type: string
          enum:
            - Polygon
            # - Linea
          description: The name of the blockchain used for the contract.
          default: Polygon
    ContractResponse:
      type: object
      properties:
        id:
          format: uuid
          type: string
          description: The ID of the contract.
        address:
          type: string
          description: >-
            The blockchain address of this contract (only for deployed
            contracts)
          nullable: true
        type:
          type: string
          description: The type of the contract.
        name:
          type: string
          description: The name of the contract.
        description:
          type: string
          nullable: true
          description: The description of the contract.
        blockchainName:
          type: string
          description: The blockchain name of the contract.
          enum:
            - Polygon
            # - Linea
        blockscanUrl:
          type: string
          nullable: true
          description: >-
            The block scan address of this contract, where you can see it live
            on the blockchain (only for deployed contracts).
        createdAt:
          type: string
          format: date-time
          description: The timestamp from when the contract was created.
        updatedAt:
          type: string
          format: date-time
          description: The timestamp from when the contract was last updated.
        deployedAt:
          type: string
          format: date-time
          nullable: true
          description: The timestamp from when the contract was deployed to the blockchain.
    TokenTypeCreateRequest:
      type: object
      properties:
        name:
          type: string
          description: The name of the token type.
        description:
          type: string
          description: The description of the token type.
        maxSupply:
          type: number
          description: The max supply of the token type.
          maximum: 2000000000
        traits:
          type: object
          description: >-
            The traits of the token type. The key is the name of the trait and
            the value is the value of the trait.
        imageUrl:
          type: string
          description: >-
            The image URL of the token type. Supported formats are PNG, JPEG,
            GIF or MP4.
    TokenTypeResponse:
      type: object
      properties:
        id:
          format: uuid
          type: string
          description: The ID of the token type.
        contractId:
          format: uuid
          type: string
          description: The ID of the contract to which this token type belongs.
        name:
          type: string
          description: The name of the token type.
        description:
          type: string
          description: The description of the token type.
          nullable: true
        maxSupply:
          type: number
          description: The max supply of the token type.
          maximum: 2000000000
        currentSupply:
          type: number
          description: The remaining supply for this token type.
        traits:
          type: object
          description: >-
            The traits of the token type. The key is the name of the trait and
            the value is the value of the trait.
          properties:
            trait1_name:
              type: string
              default: trait1_value
            trait2_name:
              type: string
              default: trait2_value
            trait3_name:
              type: string
              default: trait3_value
        imageUrl:
          type: string
          nullable: true
          description: >-
            The URL for the image you want to display for this token type.
        metadataUrl:
          type: string
          description: The URL where this token's metadata JSON is located.
        createdAt:
          type: string
          format: date-time
          description: The timestamp from when the token type was created.
        updatedAt:
          type: string
          format: date-time
          description: The timestamp from when the token type was last updated.
    TokenTypeUpdateRequest:
      type: object
      properties:
        name:
          type: string
          description: The name of the token type.
        description:
          type: string
          description: The description of the token type.
        maxSupply:
          type: number
          description: >-
            The max supply of the token type. Can only be updated if this
            token type's contract hasn't been deployed yet.
          maximum: 2000000000
        traits:
          type: object
          description: >-
            The traits of the token type. The key is the name of the trait and
            the value is the value of the trait.
        imageUrl:
          type: string
          description: >-
            The image URL of the token type. Supported formats are PNG, JPEG,
            GIF or MP4.
    TokenResponse:
      properties:
        contractId:
          type: string
          format: uuid
          nullable: true
          description: >-
            If this token belongs to a contract created through Lumx Protocol,
            this field indicates the id of that contract.
        uriNumber:
          type: number
          nullable: true
          description: >-
            If this token belongs to a contract created through Lumx Protocol,
            this field indicates the uriNumber of the token type used to mint this token.
        blockchainName:
          type: string
          description: The name of the blockchain to which this token belongs.
          enum:
            - Polygon
            # - Linea
            # - Ethereum
        contractAddress:
          type: string
          description: The address of the contract to which this token belongs.
        contractType:
          type: string
          enum:
            - fungible
            - non_fungible
          description: >-
            The type of the contract to which this token belongs ('fungible' or
            'non_fungible').
        name:
          type: string
          description: The token's name.
        nftId:
          type: string
          nullable: true
          description: >-
            Only for non-fungible contracts. Represents the sequential mint
            number for this token.
        uri:
          type: string
          description: The URI where this token's metadata is located.
          nullable: true
        metadata:
          type: object
          nullable: true
          description: "The token's metadata, such as image address, traits, etc."
        symbol:
          type: string
          nullable: true
          description: The token's symbol.
        quantity:
          type: number
          description: How much of that token is present at this wallet.
    BaseTransactionResponse:
      type: object
      properties:
        id:
          type: string
          description: The ID of the transaction.
          format: uuid
        contractId:
          type: string
          format: uuid
          description: The ID of the contract where this transaction happened.
        status:
          type: string
          description: The status of the transaction on the blockchain.
          enum:
            - pending
            - success
            - failed
        transactionHash:
          type: string
          description: The identifier of this transaction on the blockchain.
          nullable: true
        blockscanUrl:
          type: string
          description: >-
            The block scan address of this transaction, where you can see it
            live on the blockchain.
        createdAt:
          type: string
          format: date-time
          description: The timestamp from when the transaction was submitted.
        updatedAt:
          type: string
          format: date-time
          description: The timestamp from when the transaction was last updated.
        completedAt:
          type: string
          format: date-time
          description: The timestamp from when the transaction was completed.
          nullable: true
    MintTransactionResponse:
      type: object
      properties:
        metadata:
          description: An object containing the parameters used for this transaction.
          $ref: "#/components/schemas/MintTransactionMetadata"
        type:
          type: string
          description: The transaction type
          enum:
            - mint
    TransferTransactionResponse:
      type: object
      properties:
        metadata:
          description: An object containing the parameters used for this transaction.
          $ref: "#/components/schemas/TransferTransactionMetadata"
        type:
          type: string
          description: The transaction type
          enum:
            - transfer
    CustomTransactionResponse:
      type: object
      properties:
        metadata:
          description: An object containing the parameters used for this transaction.
          $ref: "#/components/schemas/CustomTransactionMetadata"
        type:
          type: string
          description: The transaction type
          enum:
            - custom
    MintRequest:
      properties:
        contractId:
          format: uuid
          type: string
          description: The ID of the contract from which to mint tokens.
        walletId:
          type: string
          format: uuid
          description: The ID of the wallet that will receive the tokens.
        quantity:
          type: number
          default: 1
          description: The quantity of tokens. Required if minting fungible tokens.
    TransferRequest:
      type: object
      properties:
        contractId:
          type: string
          description: The ID of the contract to which the tokens belong.
          format: uuid
        from:
          type: string
          description: The id of the wallet that will send the tokens.
          format: uuid
        to:
          type: string
          description: The address of the wallet that will receive tokens.
    CustomTransactionRequest:
      allOf:
        - type: object
          title: Custom
          properties:
            walletId:
              format: uuid
              type: string
              description: The ID of the wallet that will be used to perform the transaction.
            contractAddress:
              type: string
              description: The address of the contract where the transaction will occur.
            blockchainName:
              type: string
              description: The blockchain where the contract is deployed.
              enum:
                - Polygon
                # - Linea
        - $ref: "#/components/schemas/CustomTransactionMetadata"
    MintTransactionMetadata:
      type: object
      title: Mint
      description: Parameters for a mint transaction.
      properties:
        uriNumber:
          type: string
          description: The uriNumber of the token type that was minted.
        nftIds:
          type: array
          description: >-
            Only for non-fungible contracts. Represents the on-chain sequential mint
            numbers of the NFTs minted in this operation.
          items:
            type: number
          nullable: true
        quantity:
          type: number
          description: How many tokens were minted.
    TransferTransactionMetadata:
      type: object
      title: Transfer
      description: Parameters for a transfer transaction.
      properties:
        uriNumber:
          type: string
          description: The uriNumber of the token type that was minted.
        quantity:
          type: number
          description: How many tokens were transferred.
        from:
          type: string
          description: The address that sent the transfer.
        to:
          type: string
          description: The address that received the transfer.
    CustomTransactionMetadata:
      type: object
      title: Custom
      description: Parameters for a custom transaction.
      properties:
        operations:
          type: array
          description: An array with objects defining the operations to be executed in this transaction.
          items:
            type: object
            properties:
              functionSignature:
                type: string
                description: The function's signature (name and parameter types).
              functionParams:
                type: array
                description: >-
                  Array containing the values to be passed to the function, in the
                  order they appear in the function's signature.
                items:
                  anyOf:
                    - type: string
                    - type: number
                    - type: boolean
                    - type: array
                      items:
                        anyOf:
                          - type: string
                          - type: number
                          - type: boolean
              nativeTokensAmount:
                type: number
                description: Optional. The amount of native tokens (ETH, MATIC, etc) to be sent along with the transaction.
                default: 0
            required:
              - functionSignature
              - functionParams
  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      description: Bearer authentication header of the form `Bearer <API_KEY>`.
